services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest_api
    restart: unless-stopped

    environment:
      NODE_ENV: production
      API_URL: https://${API_DOMAIN}

    ports:
      - "3000:3000"

    volumes:
      - uploads_volume:/app/uploads

    depends_on:
      - postgres
      - redis

    networks:
      - backend

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - backend

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped

    volumes:
      - redis_data:/data

    networks:
      - backend

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  backend:
    driver: bridge

volumes:
  uploads_volume:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local